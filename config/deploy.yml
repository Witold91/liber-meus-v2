# Name of your application. Used to uniquely configure containers.
service: liber_meus_v2

# Name of the container image.
image: liber_meus_v2

# Deploy to these servers (overridden per destination).
servers:
  web:
    - <%= ENV.fetch("DEPLOY_HOST") %>

# Enable SSL auto certification via Let's Encrypt (enable later when you have a domain).
# proxy:
#   ssl: true
#   host: yourdomain.com

# Use GitHub Container Registry (free for private repos up to 500MB).
registry:
  server: ghcr.io
  username: <%= ENV.fetch("GITHUB_USERNAME") %>
  password:
    - KAMAL_REGISTRY_PASSWORD

# Inject ENV variables into containers (secrets come from .kamal/secrets).
env:
  secret:
    - RAILS_MASTER_KEY
    - OPENAI_API_KEY
    - DB_PASSWORD
    - GOOGLE_CLIENT_ID
    - GOOGLE_CLIENT_SECRET
  clear:
    SOLID_QUEUE_IN_PUMA: true
    DB_HOST: liber-meus-v2-db
    DB_USERNAME: liber_meus_v2
    DB_NAME: liber_meus_v2_production

# Aliases for quick access.
aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole --include-password"

# Persistent storage for Active Storage files and Solid Queue/Cache/Cable SQLite DBs.
volumes:
  - "liber_meus_v2_storage:/rails/storage"

# Bridge fingerprinted assets between versions.
asset_path: /rails/public/assets

# Use a non-root user for SSH deploys.
ssh:
  user: deploy

# Configure the image builder.
builder:
  arch: amd64

# PostgreSQL as a Kamal accessory (runs on the same server).
accessories:
  db:
    image: postgres:17
    host: <%= ENV.fetch("DEPLOY_HOST") %>
    port: "127.0.0.1:5432:5432"
    env:
      secret:
        - DB_PASSWORD
      clear:
        POSTGRES_USER: liber_meus_v2
        POSTGRES_DB: liber_meus_v2_production
    directories:
      - liber_meus_v2_postgres_data:/var/lib/postgresql/data

# Destination-specific overrides.
destinations:
  staging:
    servers:
      web:
        - <%= ENV.fetch("STAGING_HOST") %>
    accessories:
      db:
        host: <%= ENV.fetch("STAGING_HOST") %>
    env:
      clear:
        RAILS_LOG_LEVEL: debug
        DB_NAME: liber_meus_v2_staging
        AI_BASE_URL: https://openrouter.ai/api/v1
        AI_DIFFICULTY_MODEL: mistralai/mistral-small-3.2-24b-instruct
        AI_NARRATOR_MODEL: deepseek/deepseek-v3.2
        AI_JSON_MODE: true
      secret:
        - RAILS_MASTER_KEY
        - OPENAI_API_KEY
        - DB_PASSWORD
        - GOOGLE_CLIENT_ID
        - GOOGLE_CLIENT_SECRET

  production:
    servers:
      web:
        - <%= ENV.fetch("PRODUCTION_HOST") %>
    accessories:
      db:
        host: <%= ENV.fetch("PRODUCTION_HOST") %>
    env:
      clear:
        WEB_CONCURRENCY: 2
