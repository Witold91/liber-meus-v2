slug: romeo_juliet
title: "Romeo and Juliet"
description: "A five-act tragedy in Verona, mapped as five playable acts (chapters)."
turn_limit: 999
world_context: |
  Verona, late 16th century. Two noble houses, Montague and Capulet, are trapped in an old blood feud.
  Honor, reputation, and family duty shape every choice. Public violence brings swift civic punishment.
  The world is realistic and historical: no magic, no modern technology, no supernatural intervention.
  The perspective shifts between protagonists as the tragedy unfolds.
narrator_style: |
  Write in the style of Shakespeare's original plays.
  Open each turn with a brief italic stage direction (Enter Romeo at the grove. / Exeunt servants. / Romeo draws his sword.).
  Then write character dialogue in verse — iambic pentameter for nobles, prose for servants and comic moments.
  Use period diction: thee/thou, prithee, wherefore, ay, etc. Employ Shakespeare's rhetorical devices: puns, antithesis, conceits, stichomythia.
  Keep stage directions to one line. Let dialogue carry the scene: 4-8 lines of verse, 60-120 words total.

theme:
  bg_color: "#0e0a08"
  text_color: "#ffffff"
  accent_color: "#c8844a"
  font_family: "'Palatino Linotype', Palatino, 'Book Antiqua', Georgia, serif"
  bg_image: "romeo_juliet.jpg"

hero:
  slug: romeo
  name: "Romeo Montague"
  description: "A young nobleman torn between love, loyalty, and fatal impulse."
  sex: male

acts:
  - number: 1
    title: "Act I - Feud and First Sight"
    intro: |
      In a sycamore grove outside Verona's walls, Romeo Montague sits apart from the world — heartsick over Rosaline, a Capulet beauty who has given him nothing but cold silence and polished indifference.
      He has barely registered the morning's street brawl, which rattled the city and brought the Prince himself to the square with another ultimatum for both houses.
      By nightfall, Verona transforms: Capulet Hall opens its doors for a masked feast, and by chance — a servant with an unreadable guest list, a name overheard — Romeo learns that Rosaline will be among the guests.
      He goes to forget her by seeing her, and walks directly into enemy territory where one glance across a crowded hall can ignite something that will outlast both of them.
      Current situation: You are Romeo Montague, alone in a sycamore grove east of the city, nursing an unrequited love while Verona moves without you.
    scenes:
      - id: sycamore_grove
        name: "Sycamore Grove"
        description: "A quiet stand of trees on the edge of Verona where Romeo retreats to nurse his lovesickness, hidden from the brawls and politics of the city."
        exits:
          - to: verona_square
            label: "Head into the city"
          - to: montague_grounds
            label: "Return to Montague grounds"
      - id: montague_grounds
        name: "Montague Grounds"
        description: "The courtyard and entrance of the Montague estate, where family worry runs quietly beneath the surface of pride."
        exits:
          - to: sycamore_grove
            label: "Return to the grove"
          - to: verona_square
            label: "Go toward the city"
      - id: verona_square
        name: "Verona Square"
        description: "A public square where servants provoke one another and nobles rush to defend family honor. The air still carries the morning's anger."
        exits:
          - to: sycamore_grove
            label: "Slip back toward the grove"
          - to: capulet_grounds
            label: "Follow the torchlight toward Capulet Hall"
      - id: capulet_grounds
        name: "Capulet Grounds"
        description: "The lantern-lit courtyard outside Capulet Hall. Masked guests arrive in clusters, music drifts through the walls, and unmasked faces draw second glances."
        exits:
          - to: verona_square
            label: "Return to the square"
          - to: capulet_hall
            label: "Enter the hall"
      - id: capulet_hall
        name: "Capulet Hall"
        description: "A crowded feast of lanterns, viols, masks, and guarded smiles. Every face hides a name, and every name carries a history."
        exits:
          - to: capulet_grounds
            label: "Step out to the grounds"

    actors:
      - id: sampson
        name: "Sampson"
        description: "A Capulet servant eager for provocation."
        scene: verona_square
        status_options: [taunting, brawling, scattered]
        default_status: taunting
      - id: gregory
        name: "Gregory"
        description: "Another Capulet servant, loud in quarrel and quick to follow."
        scene: verona_square
        status_options: [taunting, brawling, scattered]
        default_status: taunting
      - id: abram
        name: "Abram"
        description: "A Montague servant pulled into the first clash."
        scene: verona_square
        status_options: [wary, brawling, scattered]
        default_status: wary
      - id: benvolio
        name: "Benvolio"
        description: "Romeo's cousin, always trying to cool hot blood. He is out looking for Romeo."
        scene: verona_square
        status_options: [calm, warning, alarmed]
        default_status: calm
      - id: mercutio
        name: "Mercutio"
        description: "Brilliant and reckless friend of Romeo."
        scene: verona_square
        status_options: [witty, taunting, dueling, dead]
        default_status: witty
      - id: tybalt
        name: "Tybalt"
        description: "Juliet's cousin, proud and dangerous in defense of Capulet honor. Already in the square and spoiling for a fight."
        scene: verona_square
        status_options: [proud, enraged, dueling, dead]
        default_status: proud
      - id: capulet_servant
        name: "Capulet Servant"
        description: "An illiterate servant tasked with delivering feast invitations, wandering the square looking for someone to read the guest list aloud."
        scene: verona_square
        status_options: [searching, helped, departed]
        default_status: searching
      - id: prince_escalus
        name: "Prince Escalus"
        description: "Ruler of Verona, determined to end public bloodshed."
        scene: offstage
        status_options: [stern, condemning, sentencing, grieving]
        default_status: stern
      - id: lord_montague
        name: "Lord Montague"
        description: "Romeo's father, burdened by the feud and quietly worried about his son's strange withdrawal from the world."
        scene: montague_grounds
        status_options: [concerned, defensive, mourning]
        default_status: concerned
      - id: lady_montague
        name: "Lady Montague"
        description: "Romeo's mother, fearful for her son."
        scene: montague_grounds
        status_options: [concerned, fearful, mourning]
        default_status: concerned
      - id: juliet
        name: "Juliet Capulet"
        description: "A young noblewoman whose courage deepens as danger grows."
        scene: capulet_hall
        status_options: [sheltered, curious, in_love]
        default_status: sheltered
      - id: rosaline
        name: "Rosaline"
        description: "A Capulet niece, beautiful and devout — the object of Romeo's unrequited obsession, utterly indifferent to him. If persistently pursued she becomes cold; if publicly humiliated or pushed to the limit, she becomes offended — a closed door."
        scene: capulet_hall
        status_options: [indifferent, cold, offended, absent]
        default_status: indifferent
      - id: nurse
        name: "Nurse"
        description: "Juliet's caretaker, practical and fiercely devoted."
        scene: capulet_hall
        status_options: [watchful, calling, worried, grieving]
        default_status: watchful
      - id: lord_capulet
        name: "Lord Capulet"
        description: "Juliet's father, balancing pride, affection, and social pressure."
        scene: capulet_hall
        status_options: [hosting, commanding, furious, mourning]
        default_status: hosting
      - id: lady_capulet
        name: "Lady Capulet"
        description: "Juliet's mother, formal and loyal to family standing."
        scene: capulet_hall
        status_options: [observing, urging, grieving]
        default_status: observing
      - id: paris
        name: "Count Paris"
        description: "A polished noble suitor favored by Capulet, here to press his case for Juliet's hand."
        scene: capulet_hall
        status_options: [courtly, betrothed, mourning, dead]
        default_status: courtly

    objects:
      - id: capulet_guest_list
        name: "Capulet Guest List"
        description: "A parchment list of tonight's Capulet guests, carried by an illiterate servant who needs someone to read it aloud."
        scene: verona_square
        status_options: [servant_carried, read, lost]
        default_status: servant_carried
      - id: masquerade_mask
        name: "Masquerade Mask"
        scene: capulet_hall
        status_options: [unused, worn, discarded]
        default_status: unused
      - id: romeo_sword
        name: "Romeo's Sword"
        description: "A Montague blade, worn at the hip out of habit and family pride."
        scene: player_inventory
        status_options: [sheathed, drawn, bloodied]
        default_status: sheathed

    conditions:
      - id: act1_love_ignites
        description: "The first spark between Romeo and Juliet is set."
        narrative: "Music fades, but the look remains. One glance has crossed an old war, and nothing in Verona will stay simple again."
        type: act_goal
        next_act: 2
        check: actor_has_status
        actor: juliet
        status: in_love
      - id: act1_juliet_slain
        description: "Juliet dies before the bond can begin."
        narrative: "The feud devours even its quietest promise. Without Juliet, the tale collapses into grief before it can become love."
        type: danger
        check: actor_has_status
        actor: juliet
        status: dead
      - id: act1_rosaline_offended
        description: "Romeo's obsession with Rosaline burns every bridge."
        narrative: "Rosaline's rebuff is final and public. She calls for her uncle, and the hall turns cold. You leave Capulet grounds with nothing — no introduction, no Juliet, no story that matters. The obsession closes around you like a room with no doors."
        type: danger
        check: actor_has_status
        actor: rosaline
        status: offended
      - id: act1_tybalt_slain
        description: "Tybalt dies in the morning brawl — Romeo is banished before nightfall."
        narrative: "Blood on the cobblestones before noon. When Tybalt Capulet falls, the Prince's judgment is swift: the Montague who struck first is banished by sundown. You never reach the feast, and Juliet remains a stranger."
        type: danger
        check: actor_has_status
        actor: tybalt
        status: dead
      - id: act1_romeo_banished_early
        description: "The Prince names Romeo specifically in the decree."
        narrative: "The Prince's finger lands on you. Your name has been in too many quarrels this season. By the decree read aloud in the square, you are banished from Verona — before the feast, before the balcony, before any of it begins."
        type: danger
        check: actor_has_status
        actor: prince_escalus
        status: sentencing

    events:
      - id: act1_brawl_escalates
        act_turn: 3
        action:
          type: actor_enters
          actor_id: tybalt
          scene: verona_square
          new_status: enraged
        description: "'What, drawn, and talk of peace! I hate the word, as I hate hell, all Montagues, and thee.' Tybalt draws steel on Benvolio and the morning's quarrel becomes a full brawl."
      - id: act1_montague_seeks_romeo
        act_turn: 4
        action:
          type: actor_enters
          actor_id: lord_montague
          scene: verona_square
          new_status: defensive
        description: "Lord Montague arrives at the square, alarmed by the brawl and searching for his son."
      - id: act1_prince_decree
        act_turn: 5
        action:
          type: actor_enters
          actor_id: prince_escalus
          scene: verona_square
          new_status: condemning
        description: "'If ever you disturb our streets again, your lives shall pay the forfeit of the peace.' The Prince faces both houses and makes the ultimatum final."
      - id: act1_servant_returns
        act_turn: 8
        condition:
          actor_status:
            id: capulet_servant
            status: searching
        action:
          type: actor_enters
          actor_id: capulet_servant
          scene: montague_grounds
          new_status: departed
        description: "The Capulet servant, finding no reader for his list, gives up on the square and wanders back toward the Montague side of the city — his invitation unread, the feast still waiting."

  - number: 2
    title: "Act II - Balcony and Vows"
    intro: |
      The feast is over and Verona has gone quiet, but you could not leave.
      You crossed back into enemy territory on instinct — scaling walls you have no right to cross, drawn by a name you should not have learned and a face you cannot stop seeing.
      She is above you on the balcony, her voice drifting down through the dark, unguarded in a way that no Capulet ever is in daylight.
      The Nurse runs messages. In Friar Laurence's cell, love can be made lawful in secret. But every minute you stay in this orchard is a minute a Capulet blade could find you.
      Current situation: You are Romeo Montague, standing in the Capulet orchard beneath Juliet's balcony. The night is warm. Discovery means death.
    scenes:
      - id: capulet_orchard
        name: "Capulet Orchard"
        description: "Moonlit stone and ivy below Juliet's balcony."
        exits:
          - to: friar_cell
            label: "Go to Friar Laurence"
          - to: verona_outskirts
            label: "Scale back over the wall and leave"
      - id: friar_cell
        name: "Friar Laurence's Cell"
        description: "A cramped chamber of herbs, books, and dangerous hopes."
        exits:
          - to: capulet_orchard
            label: "Return to the orchard"
      - id: verona_outskirts
        name: "Verona Outskirts"
        description: "The edge of Capulet territory before dawn, where the city fades into open road. Romeo has made it out — but empty-handed."
        exits: []

    actors:
      - id: juliet
        name: "Juliet Capulet"
        description: "Now resolute, willing to defy her house for love — but if overwhelmed by fear, pushed too fast, or left without reassurance, she may withdraw."
        scene: capulet_orchard
        status_options: [in_love, promised, withdrawn, wed, desperate, dead]
        default_status: in_love
      - id: nurse
        name: "Nurse"
        description: "A loyal go-between carrying urgent messages."
        scene: offstage
        status_options: [watchful, calling, worried, grieving]
        default_status: watchful
      - id: friar_lawrence
        name: "Friar Laurence"
        description: "A learned friar hoping to turn private love into public peace. If rushed or unconvinced of the match, he refuses outright — but his refusal is not necessarily final."
        scene: friar_cell
        status_options: [contemplative, advising, marrying, refusing, desperate]
        default_status: contemplative
      - id: capulet_guard
        name: "Capulet Guard"
        description: "A household sentry making his nightly rounds through the orchard."
        scene: offstage
        status_options: [patrolling, alarmed, searching]
        default_status: patrolling

    objects:
      - id: wedding_vows
        name: "Wedding Vows"
        scene: friar_cell
        status_options: [unspoken, spoken, broken]
        default_status: unspoken

    conditions:
      - id: act2_secret_marriage
        description: "The secret marriage is completed."
        narrative: "In a dim cell, two voices make one oath. Love has become a bond, and the feud now has a hidden fault line."
        type: act_goal
        next_act: 3
        check: actor_has_status
        actor: juliet
        status: wed
      - id: act2_left_without_vows
        description: "Romeo leaves the orchard with no marriage, only the memory of a name."
        narrative: "Dawn threatens the sky. Romeo scales the wall back into Verona before a Capulet blade finds him — and leaves behind whatever Juliet might have been. No vow was spoken. What comes next will carry that absence."
        type: act_goal
        next_act: 3
        check: player_at_scene
        scene: verona_outskirts
      - id: act2_discovered
        description: "The guard raises the alarm — Romeo is driven out of the orchard."
        narrative: "The shout goes up before Romeo can move. Torches bloom in every window of Capulet Hall. He escapes over the wall with nothing settled, and dawn comes without a vow."
        type: danger
        check: actor_has_status
        actor: capulet_guard
        status: alarmed
      - id: act2_juliet_slain
        description: "Juliet dies before the marriage can hold."
        narrative: "The orchard falls silent. What was meant to heal Verona dies in shadow before dawn."
        type: danger
        check: actor_has_status
        actor: juliet
        status: dead

    events:
      - id: act2_nurse_interrupts
        act_turn: 3
        action:
          type: actor_enters
          actor_id: nurse
          scene: capulet_orchard
          new_status: calling
        description: "The Nurse calls Juliet back inside."
      - id: act2_guard_patrols
        act_turn: 5
        action:
          type: actor_enters
          actor_id: capulet_guard
          scene: capulet_orchard
          new_status: patrolling
        description: "A Capulet guard makes his nightly rounds through the orchard."

  - number: 3
    hero:
      slug: romeo
      name: "Romeo Montague"
      description: "A young nobleman torn between love, loyalty, and fatal impulse."
      sex: male
    title: "Act III - Duel and Banishment"
    intro: |
      Verona at noon is hot, crowded, and brittle; one taunt can turn a street into a battlefield.
      Tybalt demands honor, Mercutio answers with mockery, and Benvolio can already see the shape of coming grief.
      Romeo now stands between sworn friendship and secret marriage, trying to keep peace in a city that rewards retaliation.
      Once blood is spilled, judgment will be swift: the Prince's sentence can separate lovers faster than any wall.
      Current situation: You are in the Dueling Square with Mercutio, Tybalt, and Benvolio present, and the crowd is seconds away from violence.
    scenes:
      - id: dueling_square
        name: "Dueling Square"
        description: "A crowded Verona street where honor and anger turn lethal."
        exits:
          - to: juliet_chamber
            label: "Run to Juliet's chamber"
          - to: mantua_road
            label: "Flee toward Mantua"
      - id: juliet_chamber
        name: "Juliet's Chamber"
        description: "A private room where joy and grief collide in one night."
        exits:
          - to: dueling_square
            label: "Return to the street"
          - to: mantua_road
            label: "Escape toward Mantua"
      - id: mantua_road
        name: "Road to Mantua"
        description: "A hard road out of Verona under sentence of banishment."
        exits:
          - to: juliet_chamber
            label: "Risk returning to Juliet"

    actors:
      - id: mercutio
        name: "Mercutio"
        description: "Romeo's fierce friend, wounded by feud and pride."
        scene: dueling_square
        status_options: [taunting, dueling, wounded, dead]
        default_status: taunting
      - id: tybalt
        name: "Tybalt"
        description: "Capulet champion demanding satisfaction."
        scene: dueling_square
        status_options: [enraged, dueling, dead]
        default_status: enraged
      - id: benvolio
        name: "Benvolio"
        description: "Voice of restraint amid rising violence. If he succeeds in cooling both sides, he becomes resolved — the duel ends before it begins."
        scene: dueling_square
        status_options: [warning, alarmed, resolved]
        default_status: warning
      - id: juliet
        name: "Juliet Capulet"
        description: "Torn between her love for Romeo and the violence erupting in the streets below."
        scene: juliet_chamber
        status_options: [in_love, promised, wed, distraught, desperate, dead]
        default_status: wed
      - id: nurse
        name: "Nurse"
        description: "Bearer of grim news."
        scene: juliet_chamber
        status_options: [worried, grieving]
        default_status: worried
      - id: prince_escalus
        name: "Prince Escalus"
        description: "Judge of Verona's blood feud."
        scene: offstage
        status_options: [condemning, sentencing, grieving]
        default_status: condemning
    objects:
      - id: romeo_sword
        name: "Romeo's Sword"
        scene: player_inventory
        status_options: [sheathed, drawn, bloodied]
        default_status: sheathed
      - id: prince_banishment_edict
        name: "Banishment Edict"
        scene: dueling_square
        status_options: [unissued, proclaimed, ignored]
        default_status: unissued

    conditions:
      - id: act3_peace_held
        description: "Benvolio brokers a truce — no blood spilled, no banishment called."
        narrative: "Steel goes back into sheaths. Benvolio's words, against all expectation, hold. No one dies today, and the Prince's name is never invoked. Verona breathes again — and love has a different shape to carry into the next act."
        type: act_goal
        next_act: 4
        check: actor_has_status
        actor: benvolio
        status: resolved
      - id: act3_banishment
        description: "Romeo flees Verona under sentence of banishment."
        narrative: "The road stretches ahead into darkness. Verona, Juliet, everything — behind you. The exile has begun."
        type: act_goal
        next_act: 4
        check: player_at_scene
        scene: mantua_road
      - id: act3_juliet_slain
        description: "Juliet dies in the fallout of the duel."
        narrative: "After blood in the street, blood reaches the house. The feud swallows the heart of Verona's youngest hope."
        type: danger
        check: actor_has_status
        actor: juliet
        status: dead
      - id: act3_execution_sentenced
        description: "The Prince orders Romeo's execution rather than banishment."
        narrative: "The Prince weighs the blood and the defiance together and makes a harder ruling. No exile — a sentence of death. Verona has run out of patience for Montague mercy."
        type: danger
        check: actor_has_status
        actor: prince_escalus
        status: sentencing

    events:
      - id: act3_duel_begins_mercutio
        act_turn: 2
        action:
          type: actor_enters
          actor_id: mercutio
          scene: dueling_square
          new_status: dueling
        description: "Mercutio answers Tybalt's challenge."
      - id: act3_duel_begins_tybalt
        act_turn: 2
        action:
          type: actor_enters
          actor_id: tybalt
          scene: dueling_square
          new_status: dueling
        description: "Tybalt presses the duel in open street."
      - id: act3_tybalt_turns_on_romeo
        trigger:
          actor_status:
            actor: mercutio
            status: dead
        action:
          type: actor_enters
          actor_id: tybalt
          scene: dueling_square
          new_status: enraged
        description: "Mercutio's last breath carries a curse: 'A plague o' both your houses!' With him fallen, Tybalt's fury turns on Romeo."
      - id: act3_prince_arrives
        trigger:
          actor_status:
            actor: tybalt
            status: dead
        action:
          type: actor_enters
          actor_id: prince_escalus
          scene: dueling_square
          new_status: condemning
        description: "'And for that offence immediately do we exile him hence.' The Prince strides into the square and passes sentence on Romeo."

  - number: 4
    title: "Act IV - The Sleeping Draught"
    hero:
      slug: juliet
      name: "Juliet Capulet"
      description: "Clear-eyed and resolute, determined to control her own fate."
      sex: female
    intro: |
      The Capulet household has decided your future without asking. Your father has set a date: Paris will have your hand within three days. Your mother agrees. The Nurse counsels acceptance.
      Whether Romeo is across Verona or across Italy, everyone around you assumes the matter is settled — and none of them know what you have risked for love.
      Only the Friar understands the truth, and only he might know a way through.
      Current situation: You are Juliet Capulet, alone in your chamber, with three days before a wedding you cannot allow to happen.
    scenes:
      - id: juliet_chamber
        name: "Juliet's Chamber"
        description: "A private room where every knock at the door brings more pressure."
        exits:
          - to: friar_cell
            label: "Go to Friar Laurence"
          - to: capulet_crypt
            label: "Descend toward the family crypt"
          - to: mantua_road
            label: "Slip out of the house and flee Verona"
      - id: friar_cell
        name: "Friar Laurence's Cell"
        description: "A quiet refuge for desperate counsel."
        exits:
          - to: juliet_chamber
            label: "Return to your chamber"
      - id: capulet_crypt
        name: "Capulet Crypt"
        description: "A cold vault prepared for noble dead — and, perhaps, one who only seems so."
        exits:
          - to: juliet_chamber
            label: "Climb back toward the house"
      - id: mantua_road
        name: "Road to Mantua"
        description: "The open road beyond Verona's walls. Whatever waits ahead, there is no going back."
        exits: []

    actors:
      - id: romeo
        name: "Romeo Montague"
        description: "Juliet's love, out of reach — banished or in hiding, his fate was sealed in the streets."
        scene: offstage
        status_options: [exiled, hiding, desperate]
        default_status: exiled
      - id: nurse
        name: "Nurse"
        description: "Your lifelong confidante, beginning to counsel surrender."
        scene: juliet_chamber
        status_options: [worried, urging, grieving]
        default_status: worried
      - id: lord_capulet
        name: "Lord Capulet"
        description: "Impatient to secure the marriage to Paris. If pushed beyond fury — if his authority is openly defied or the secret is revealed — he disowns Juliet entirely."
        scene: juliet_chamber
        status_options: [commanding, furious, disowning, mourning]
        default_status: commanding
      - id: lady_capulet
        name: "Lady Capulet"
        description: "Presses you toward the arranged match."
        scene: juliet_chamber
        status_options: [urging, grieving]
        default_status: urging
      - id: paris
        name: "Count Paris"
        description: "Confident that the wedding will proceed — unless he learns the truth about Romeo."
        scene: offstage
        status_options: [betrothed, suspicious, mourning, dead]
        default_status: betrothed
      - id: friar_lawrence
        name: "Friar Laurence"
        description: "Architect of a perilous rescue plan — but if his nerve breaks or the plan unravels, he may refuse to go further."
        scene: friar_cell
        status_options: [advising, refusing, desperate]
        default_status: advising

    objects:
      - id: sleeping_draught
        name: "Sleeping Draught"
        scene: friar_cell
        status_options: [prepared, taken, spent]
        default_status: prepared
      - id: friar_letter
        name: "Letter to Romeo"
        scene: friar_cell
